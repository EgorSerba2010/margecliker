<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>2048 Кликер-Стратегия</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-wrapper">
        <!-- Верхняя панель управления -->
        <div class="top-bar">
            <!-- Левая часть: только баланс денег и пассивный доход -->
            <div class="balance-board">
                <div class="balance-text">Баланс: <span id="balance-value">100</span></div>
                <div class="pps-counter">Доход: +<span id="pps-value">0</span> $/сек</div>
            </div>
            
            <!-- Правая часть: колонка с алмазами сверху и часами снизу -->
            <div class="right-bar-column">
                <div class="diamonds-counter" title="Ваши алмазы">💎 <span id="diamonds-value">0</span></div>
                
                <div class="timer-container" title="До появления новой карточки">
                    <svg class="progress-ring" width="50" height="50">
                        <circle class="progress-ring__background" stroke="#e0e0e0" stroke-width="4" fill="transparent" r="20" cx="25" cy="25"/>
                        <circle class="progress-ring__circle" id="timer-ring" stroke="#4a90e2" stroke-width="4" fill="transparent" r="20" cx="25" cy="25"/>
                    </svg>
                    <span class="timer-icon">⏳</span>
                </div>
            </div>
        </div>
        
        <!-- Игровое поле -->
        <div id="sandbox" class="container"></div>
        
        <!-- Кнопки управления магазинами -->
        <div class="shop-anchors-row">
            <button id="anchor" popovertarget="shop">🛒</button>
            <button id="upgrades-anchor" popovertarget="upgrades-shop">💎</button>
        </div>
        
        <!-- Поповер-меню обычного магазина -->
        <div class="shop-container" id="shop" popover>
            <h2 class="shop-main-title">МАГАЗИН</h2>
            <div class="shop-list">
                <div class="shop-item-row" id="shop-row-1">
                    <div class="shop-item-preview val-1">1</div>
                    <button class="shop-btn" id="buy-1-btn" onclick="buyCard(1)">Купить за <span id="price-1">10</span> $</button>
                </div>
                <div class="shop-item-row" id="shop-row-2">
                    <div class="shop-item-preview val-2">2</div>
                    <button class="shop-btn" id="buy-2-btn" onclick="buyCard(2)">Купить за <span id="price-2">50</span> $</button>
                </div>
                <div class="shop-item-row" id="shop-row-4">
                    <div class="shop-item-preview val-4">4</div>
                    <button class="shop-btn" id="buy-4-btn" onclick="buyCard(4)">Купить за <span id="price-4">200</span> $</button>
                </div>
                <div class="shop-item-row locked" id="shop-row-8">
                    <div class="shop-item-preview val-8">8</div>
                    <button class="shop-btn" id="buy-8-btn" onclick="buyCard(8)">Купить за <span id="price-8">1000</span> $</button>
                </div>
                <div class="shop-item-row locked" id="shop-row-16">
                    <div class="shop-item-preview val-16">16</div>
                    <button class="shop-btn" id="buy-16-btn" onclick="buyCard(16)">Купить за <span id="price-16">5000</span> $</button>
                </div>
                <div class="shop-item-row locked" id="shop-row-32">
                    <div class="shop-item-preview val-32">32</div>
                    <button class="shop-btn" id="buy-32-btn" onclick="buyCard(32)">Купить за <span id="price-32">20000</span> $</button>
                </div>
                <div class="shop-item-row locked" id="shop-row-64">
                    <div class="shop-item-preview val-64">64</div>
                    <button class="shop-btn" id="buy-64-btn" onclick="buyCard(64)">Купить за <span id="price-64">100000</span> $</button>
                </div>
                <div class="shop-item-row locked" id="shop-row-128">
                    <div class="shop-item-preview val-128">128</div>
                    <button class="shop-btn" id="buy-128-btn" onclick="buyCard(128)">Купить за <span id="price-128">500000</span> $</button>
                </div>
                <div class="shop-item-row locked" id="shop-row-256">
                    <div class="shop-item-preview val-256">256</div>
                    <button class="shop-btn" id="buy-256-btn" onclick="buyCard(256)">Купить за <span id="price-256">2000000</span> $</button>
                </div>
                <div class="shop-item-row locked" id="shop-row-512">
                    <div class="shop-item-preview val-512">512</div>
                    <button class="shop-btn" id="buy-512-btn" onclick="buyCard(512)">Купить за <span id="price-512">10000000</span> $</button>
                </div>
            </div>
        </div>

        <!-- Поповер-меню улучшений за алмазы -->
        <div class="shop-container" id="upgrades-shop" popover>
            <h2 class="shop-main-title">УЛУЧШЕНИЯ</h2>
            <div class="shop-list">
                <div class="shop-item-row">
                    <div class="upgrade-item-info">
                        <span class="upgrade-name">Сон инвестора</span>
                        <span class="upgrade-desc">Макс. оффлайн время: +30 мин</span>
                        <span class="upgrade-level">Ур. <span id="boost-offline-lvl">0</span></span>
                    </div>
                    <button class="upgrade-btn" id="buy-boost-offline-btn" onclick="buyUpgrade('offline')">
                        <span id="price-boost-offline">2</span> 💎
                    </button>
                </div>
            </div>
        </div>

        <!-- ВЕРНУЛИ: ОКНО ПОЗДРАВЛЕНИЯ (ПОПОВЕР) -->
        <div class="unlock-popup-container" id="unlock-popup" popover>
            <h2 class="unlock-title shiny-text">ПОЗДРАВЛЯЕМ!</h2>
            <p class="unlock-subtitle">Вы открыли новую карточку:</p>
            
            <div id="unlocked-card-display" class="drag-item-preview"></div>
            
            <!-- Посадочное место для начисления алмазов -->
            <p class="diamonds-reward-text" id="diamonds-reward-text">Награда: 💎 <span id="diamonds-reward-value">0</span></p>
            
            <p id="shop-alert-text" class="shop-alert"></p>
            
            <button class="unlock-close-btn" onclick="document.getElementById('unlock-popup').hidePopover()">ОТЛИЧНО!</button>
        </div>

        <!-- Окно оффлайн дохода -->
        <div class="unlock-popup-container" id="offline-popup" popover>
            <h2 class="unlock-title shiny-text">С ВОЗВРАЩЕНИЕМ!</h2>
            <p class="unlock-subtitle" id="offline-time-text">Вас не было in игре: 0 сек</p>
            <div class="offline-gold-icon">💰</div>
            <p class="offline-reward-text">Вы заработали пассивно:</p>
            <h3 class="offline-reward-value">+<span id="offline-reward-value">0</span> $</h3>
            <button class="unlock-close-btn" onclick="document.getElementById('offline-popup').hidePopover()">ЗАБРАТЬ НАГРАДУ!</button>
        </div>

        <!-- Нижняя панель разработчика -->
        <div class="footer-panel">
            <button class="reset-btn" onclick="hardResetGame()">⚙️ Сбросить весь прогресс</button>
        </div>
    </div>

    <script src="main.js" defer></script>
</body>
</html>
